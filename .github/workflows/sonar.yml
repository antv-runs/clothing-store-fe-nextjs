name: SonarQube Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          CI: false
        run: npm run build

      - name: Run SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=clothing-store-nextjs
            -Dsonar.projectName=clothing-store-nextjs
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,public/**